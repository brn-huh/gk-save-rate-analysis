openapi: 3.0.3
info:
  title: FC온라인 API
  version: 1.0.0
  description: |-
servers:
  - url: 'https://fco.dn.nexoncdn.co.kr'
tags:
  - name: Image
    description: 이미지 정보 조회
paths:
  /live/externalAssets/common/playersAction/p{spid}.png:
    get:
      tags:
        - Image
      summary: 선수 고유 식별자(spid)로 선수 액션샷 이미지 조회
      description: |
        선수 고유 식별자(spid)로 선수의 액션샷 이미지를 가져옵니다.
        * 특정 선수들은 이미지가 존재하지 않을 수 있습니다.
      operationId: fconline_get_action_img_by_spid
      parameters:
        - name: spid
          in: path
          description: 선수 고유 식별자
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: SUCCESS
          content:
            image/png:
              schema:
                example: 선수 액션샷 이미지
  /live/externalAssets/common/playersAction/p{pid}.png:
    get:
      tags:
        - Image
      summary: 선수 식별자(pid)로 선수 액션샷 이미지 조회
      description: |
        pid 로 선수의 액션샷 이미지를 가져옵니다
        * 특정 선수들은 이미지가 존재하지 않을 수 있습니다
        * (pid)가 "0"으로 시작하는 경우, 시작 부분의 0을 모두 제외해야 정상적으로 조회가 가능합니다 (ex. "000401" 일 경우 "401"로 조회)
      operationId: fconline_get_action_img_by_pid
      parameters:
        - name: pid
          in: path
          description: 선수 식별자
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: SUCCESS
          content:
            image/png:
              schema:
                example: 선수 액션샷 이미지
  /live/externalAssets/common/players/p{spid}.png:
    get:
      tags:
        - Image
      summary: 선수 고유 식별자(spid)로 선수 이미지 조회
      description: |
        선수 고유 식별자(spid)로 선수의 이미지를 가져옵니다.
        * 특정 선수들은 이미지가 존재하지 않을 수 있습니다.
      operationId: fconline_get_img_by_spid
      parameters:
        - name: spid
          in: path
          description: 선수 고유 식별자 (/fconline/v1/meta/spid API 참고)
          required: true
          schema:
            type: integer
            example: 167680
      responses:
        '200':
          description: SUCCESS
          content:
            image/png:
              schema:
                example: 선수 이미지                
  /live/externalAssets/common/players/p{pid}.png:
    get:
      tags:
        - Image
      summary: 선수 식별자(pid)로 선수 이미지 조회
      description: |
        pid로 선수의 이미지를 가져옵니다
        * 특정 선수들은 이미지가 존재하지 않을 수 있습니다
        * (pid)가 "0"으로 시작하는 경우, 시작 부분의 0을 모두 제외해야 정상적으로 조회가 가능합니다 (ex. "000401" 일 경우 "401"로 조회)
      operationId: fconline_get_img_by_pid
      parameters:
        - name: pid
          in: path
          description: 선수 식별자 (spid 뒤 6자리)
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: SUCCESS
          content:
            image/png:
              schema:
                example: 선수 액션샷 이미지                 
                